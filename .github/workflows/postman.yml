name: Postman Tests
 
on:
  schedule:
    - cron: '0 14 * * 1-5'   # Todos los días a las 8:00 AM UTC (5:00 AM Argentina)
  workflow_dispatch:        # Permite correrlo manualmente desde GitHub

jobs:
  run-postman-tests:
    name: Run Newman
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra
 
      - name: Create results directory
        run: mkdir -p results
 
      - name: Run Postman Collection
        continue-on-error: true
        run: |
          LOGO_BASE64=$(base64 -w 0 logo.png)
          newman run \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --environment \
            "https://api.getpostman.com/environments/${{ secrets.POSTMAN_ENVIRONMENT_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --reporters cli,htmlextra,junit \
            --reporter-junit-export results/junit.xml \
            --reporter-htmlextra-export results/report.html \
            --reporter-htmlextra-title "Coffee House API" \
            --reporter-htmlextra-browserTitle "Coffee House API" \
            --reporter-htmlextra-logs \
            --reporter-htmlextra-showEnvironmentData \
            --reporter-htmlextra-timeline \
            --reporter-htmlextra-logo "data:image/png;base64,${LOGO_BASE64}"
 
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: results/junit.xml
          fail_on_failure: false
          include_passed: false
          detailed_summary: true
 
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: results/report.html
          retention-days: 30
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: sebassdevita@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "☕ Coffee House API — Reporte diario ${{ github.run_number }}"
          to: sebassdevita@gmail.com
          from: sebassdevita@gmail.com
          html_body: |
            <h2>☕ Coffee House API — Reporte de Tests</h2>
            <p>Se adjunta el reporte completo de la ejecución del día.</p>
            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                Ver ejecución en GitHub Actions
              </a>
            </p>
          attachments: results/report.html
