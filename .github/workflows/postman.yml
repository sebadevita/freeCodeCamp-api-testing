name: Postman Tests
 
on:
  schedule:
    - cron: '0 14 * * 1-5'   # Todos los días a las 8:00 AM UTC (5:00 AM Argentina)
  workflow_dispatch:        # Permite correrlo manualmente desde GitHub
 
jobs:
  run-postman-tests:
    name: Run Newman
    runs-on: ubuntu-latest
    permissions:
      checks: write       # Necesario para publicar resultados de tests
      contents: read
 
    steps:
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra newman-reporter-junitfull
 
      - name: Create results directory
        run: mkdir -p results
 
      - name: Run Postman Collection
        continue-on-error: true
        run: |
          newman run \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --environment \
            "https://api.getpostman.com/environments/${{ secrets.POSTMAN_ENVIRONMENT_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --reporters cli,htmlextra,junitfull \
            --reporter-htmlextra-export results/report.html \
            --reporter-htmlextra-showOnlyFails \
            --reporter-htmlextra-title "Postman Test Report" \
            --reporter-junitfull-export results/junit.xml
 
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: results/junit.xml
          fail_on_failure: false        # No falla el workflow, solo muestra el reporte
          include_passed: false         # Solo muestra los que fallaron
          detailed_summary: true        # Muestra el detalle de cada fallo en el summary
 
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: results/report.html
          retention-days: 30
