name: Postman Tests
 
on:
  schedule:
    - cron: '0 14 * * 1-5'   # Todos los días a las 8:00 AM UTC (5:00 AM Argentina)
  workflow_dispatch:        # Permite correrlo manualmente desde GitHub
 
jobs:
  run-postman-tests:
    name: Run Newman
    runs-on: ubuntu-latest
 
    steps:
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra
 
      - name: Run Postman Collection
        continue-on-error: true   # No falla el workflow si hay tests que no pasan
        run: |
          newman run \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --environment \
            "https://api.getpostman.com/environments/${{ secrets.POSTMAN_ENVIRONMENT_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export results/report.html
 
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: results/report.html
          retention-days: 30
