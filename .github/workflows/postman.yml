name: Postman Tests
 
on:
  schedule:
    - cron: '0 14 * * 1-5'   # Todos los días a las 8:00 AM UTC (5:00 AM Argentina)
  workflow_dispatch:        # Permite correrlo manualmente desde GitHub

jobs:
  run-postman-tests:
    name: Run Newman
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra
 
      - name: Create results directory
        run: mkdir -p results
 
      - name: Generate Newman config with logo
        run: |
          LOGO_BASE64=$(base64 -w 0 logo.png)
          echo '{
            "reporter": {
              "htmlextra": {
                "export": "results/report.html",
                "title": "Coffee House API",
                "browserTitle": "Coffee House API",
                "logo": "data:image/png;base64,'"${LOGO_BASE64}"'",
                "showEnvironmentData": true,
                "logs": true,
                "timeline": true
              }
            }
          }' > newman-config.json
 
      - name: Run Postman Collection
        continue-on-error: true
        run: |
          newman run \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --environment \
            "https://api.getpostman.com/environments/${{ secrets.POSTMAN_ENVIRONMENT_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --reporters cli,htmlextra,junit \
            --reporter-junit-export results/junit.xml \
            --options newman-config.json
 
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: results/junit.xml
          fail_on_failure: false
          include_passed: false
          detailed_summary: true
 
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: results/report.html
          retention-days: 30
